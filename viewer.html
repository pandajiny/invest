<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>문서 보기 · 투자 메모</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --paper: #ffffff;
      --ink: #17202a;
      --muted: #667085;
      --line: #d9dee8;
      --green: #0f8f5f;
      --green-soft: #e4f7ee;
      --shadow: 0 12px 34px rgba(15, 23, 42, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.7;
    }

    .page {
      max-width: 820px;
      margin: 0 auto;
      padding: 40px 20px 80px;
    }

    .back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 24px;
      color: var(--green);
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
    }

    .back:hover { text-decoration: underline; }

    .doc {
      padding: 40px 44px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--paper);
      box-shadow: var(--shadow);
      word-break: keep-all;
      overflow-wrap: anywhere;
    }

    .doc h1 { margin: 0 0 16px; font-size: 34px; line-height: 1.25; }
    .doc h2 { margin: 36px 0 12px; font-size: 24px; padding-bottom: 8px; border-bottom: 1px solid var(--line); }
    .doc h3 { margin: 28px 0 10px; font-size: 19px; }
    .doc p { margin: 0 0 16px; }
    .doc ul, .doc ol { margin: 0 0 16px; padding-left: 24px; }
    .doc li { margin-bottom: 6px; }
    .doc a { color: var(--green); }
    .doc blockquote {
      margin: 0 0 16px;
      padding: 8px 16px;
      border-left: 4px solid var(--green);
      background: var(--green-soft);
      color: #075c3e;
    }
    .doc code {
      padding: 2px 6px;
      border-radius: 4px;
      background: #eef1f5;
      font-size: 0.9em;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    .doc pre {
      margin: 0 0 16px;
      padding: 16px;
      border-radius: 8px;
      background: #1f2733;
      color: #e6edf3;
      overflow-x: auto;
    }
    .doc pre code { padding: 0; background: none; color: inherit; }
    .doc table {
      width: 100%;
      margin: 0 0 16px;
      border-collapse: collapse;
      font-size: 0.95em;
    }
    .doc th, .doc td { padding: 8px 12px; border: 1px solid var(--line); text-align: left; }
    .doc th { background: #f0f3f7; }
    .doc img { max-width: 100%; }
    .doc hr { margin: 28px 0; border: none; border-top: 1px solid var(--line); }

    .state { color: var(--muted); text-align: center; padding: 60px 0; }
    .state a { color: var(--green); }

    @media (max-width: 640px) {
      .doc { padding: 28px 20px; }
      .doc h1 { font-size: 27px; }
    }
  </style>
</head>
<body>
  <main class="page">
    <a class="back" href="index.html">← 문서 목록</a>
    <article id="doc" class="doc">
      <p class="state">문서를 불러오는 중…</p>
    </article>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/marked@13.0.3/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const doc = params.get("doc");
    const el = document.getElementById("doc");

    function showError(message) {
      el.innerHTML = '<p class="state">' + message +
        ' <a href="index.html">목록으로 돌아가기</a></p>';
    }

    if (!doc) {
      showError("문서 경로가 지정되지 않았습니다.");
    } else if (!doc.endsWith(".md") || doc.includes("://") || doc.startsWith("/")) {
      // 같은 저장소의 상대 경로 .md 파일만 허용
      showError("열 수 없는 문서입니다.");
    } else {
      fetch(doc)
        .then(function (res) {
          if (!res.ok) throw new Error(res.status);
          return res.text();
        })
        .then(function (text) {
          const firstLine = text.split("\n").find(function (l) { return l.trim(); }) || "";
          const title = firstLine.replace(/^#\s*/, "").trim();
          if (title) document.title = title + " · 투자 메모";
          const html = marked.parse(text);
          el.innerHTML = DOMPurify.sanitize(html);
        })
        .catch(function () {
          showError("문서를 불러오지 못했습니다.");
        });
    }
  </script>
</body>
</html>
